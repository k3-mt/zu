# article-summary — pull an article's title and its section headings, grounded.
# Shows a non-scalar output shape (an array) under the same schema + grounding
# discipline as price-extractor.
query: "Extract the article title and the text of each section heading."
target: "https://blog.example/posts/event-sourcing-for-agents"
max_tier: 1
output_schema:
  type: object
  properties:
    title: { type: string }
    headings:
      type: array
      items: { type: string }
  required: [title, headings]
budget: { max_steps: 12, max_tokens: 100000, wall_time_s: 60 }
