# A whole agent in one file: what (task) + how (model, tier ladder, checks).
# Run it:  zu run agent.yaml         (needs ANTHROPIC_API_KEY)
provider:
  name: anthropic
  model: claude-sonnet-4-6
  api_key_env: ANTHROPIC_API_KEY      # the env var NAME — never the key itself

tiers:                                # the escalation ladder — tools at each tier
  1: [http_fetch, html_parse]         # tier 1 only here (no browser needed)

plugins:
  validators: [schema, grounding]     # shape it, then prove every value is on the page

budget: { max_steps: 12, max_tokens: 100000, wall_time_s: 60 }

task:
  query: "Extract the product name and price from the page."
  target: "https://shop.example/products/aeropress-go"
  max_tier: 1
  output_schema:
    type: object
    properties:
      name:  { type: string }
      price: { type: string }
    required: [name, price]
