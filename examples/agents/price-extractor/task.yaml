# price-extractor — pull a product's name and price off a page, schema-shaped and
# grounded (every value must actually appear in the fetched content).
query: "Extract the product name and price from the page."
target: "https://shop.example/products/aeropress-go"
max_tier: 1
output_schema:
  type: object
  properties:
    name: { type: string }
    price: { type: string }
  required: [name, price]
budget: { max_steps: 12, max_tokens: 100000, wall_time_s: 60 }
