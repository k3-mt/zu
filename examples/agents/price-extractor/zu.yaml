# Run with a real model:  zu run task.yaml -c zu.yaml   (needs ANTHROPIC_API_KEY)
# Swap the model by editing the provider block — the loop only speaks to the port.
provider:
  name: anthropic
  model: claude-sonnet-4-6
  api_key_env: ANTHROPIC_API_KEY

plugins:
  tools: [http_fetch, html_parse]        # tier 1: fetch the page, pull values out
  validators: [schema, grounding]        # shape it, then prove every value is on the page

budget: { max_steps: 12, max_tokens: 100000, wall_time_s: 60 }
