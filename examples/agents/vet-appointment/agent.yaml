# Vet-appointment finder — search the web for a practice's booking page, read it,
# and return the next 3 soonest available appointment slots (grounded: every slot
# and the booking_url must actually appear on the page — nothing invented).
#
# A whole agent in one file: what (task) + how (model, tier ladder, checks).
#   zu run examples/agents/vet-appointment/              # needs keys in .env
#   zu run examples/agents/vet-appointment/ --sandboxed  # contained on Docker
#
# Secrets live in a gitignored .env next to this file (see .env.example):
#   EXA_API_KEY         — for web_search (the Exa connector)
#   OPENROUTER_API_KEY  — for the model (via OpenRouter)
#   OPENROUTER_BASE_URL — https://openrouter.ai/api/v1
# The .env is loaded for the run (and mounted with the bundle when --sandboxed),
# so config names the env var, never the key itself.

provider:
  name: openai-compatible            # OpenRouter is an OpenAI-compatible endpoint
  model: anthropic/claude-sonnet-4.5
  base_url_env: OPENROUTER_BASE_URL  # https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY    # the env var NAME — never the key itself

tiers:                                  # the escalation ladder — tools per tier
  1: [web_search, http_fetch, html_parse, recall]   # search, fetch, and recall
                                            # earlier-retrieved content that scrolled
                                            # out of context (the run log is queryable)
  2: [render_dom, browser]                  # unlocked if the page needs JavaScript:
                                            #   render_dom — one-shot render
                                            #   browser    — a PERSISTENT session to
                                            #   drive a multi-step widget step by step

plugins:
  # Detectors decide when tier 1 isn't enough and the loop must escalate to the
  # tier-2 browser: an empty/erroring fetch, a JS shell, a bot wall, or a page
  # whose content is deferred to an embedded JS widget (e.g. a booking widget —
  # the common case for vet appointments).
  detectors: [empty, error, js-shell, embedded-widget, bot-wall]
  # Shape the result, then prove every reported value is on the page.
  validators: [schema, grounding]

budget: { max_steps: 70, max_tokens: 900000, wall_time_s: 900 }

# The browser tool returns a FOCUSED observation each turn — what CHANGED (the
# diff: a new step or a validation error), the visible controls (the menu), and
# captured-network METADATA — not the whole page re-sent. Large fields (a fetched
# page, the captured response bodies) are elided above this threshold to a `recall`
# pointer: the full content stays on the event log and the model pulls back exactly
# what it needs with recall — lossless, never a truncated tail.
max_observation_chars: 20000
observation_strategy: truncate   # = elide over-cap content to a recall pointer
# Bound the TOTAL running conversation too (old tool observations elided to recall
# pointers, recent ones kept) so a long multi-step session never overflows inside
# the token budget; recall pulls back anything elided.
max_context_chars: 35000

# audit: runs on a bare host (web_search's egress is scoped to api.exa.ai; the
# fetch tools carry their own SSRF guard). Run it --sandboxed to enforce the
# container boundary; because the page URL is discovered at run time, the fetch
# tools declare open (but fully logged) egress.
containment: audit

task:
  query: >
    Find the online booking page for Park Vets in Chislehurst and return the next
    3 soonest available appointment slots (date + time). Start with web_search,
    then http_fetch the booking page. The booking is a multi-step JavaScript widget
    (Vetstoria), so the times are not in the static HTML: use the `browser` tool to
    drive it step by step — open the booking page, then act/read to choose the
    Chislehurst location and work through the wizard (new client, species, a
    consultation appointment type, then Next) until the calendar of dates appears.
    The dates are a horizontal strip; the controls show each date's state (e.g.
    "Wed Jun 24 — Wednesday June 24th is available"). Click an AVAILABLE date (not
    one marked not available) to load its times — the times then appear in the page;
    READ them. Do NOT click a time slot — clicking a time advances to booking; you
    only need to READ the times. Collect the 3 soonest times starting from the
    earliest available date, moving to the next available date if one has fewer than
    3, pairing each time with its date (a slot is a date + a time — never a bare
    time). Report each date EXACTLY as the calendar shows it (e.g. "Wed Jun 24"); do
    not convert it to another format or add a year the page does not display, so the
    value can be verified against the page. Read the visible times directly; do not
    dig through raw API JSON. Read the
    page after each step and react — if action_error comes back, the selector
    missed, so look at the returned text and try another. On a form step, fill
    EVERY required field before clicking Next; for an option that appears many
    times (e.g. a number-of-pets 1/2/3 button), use a click with "near" set to the
    field's label so the closest matching control is chosen. If a cookie/consent
    dialog appears and blocks interaction, dismiss it FIRST (click its
    accept/agree/got-it button) before continuing. Stay in ONE browser session —
    do NOT close and reopen it (reopening resets cookies and wastes steps); keep
    acting/reading in the same session until you reach the times. Report ONLY slots
    and a booking_url that actually appear in what you retrieved — never guess a time.
  max_tier: 2
  output_schema:
    type: object
    properties:
      slots:
        type: array
        minItems: 3
        maxItems: 3
        items:
          type: object
          properties:
            date: { type: string }   # as shown on the page, e.g. "Wed Jun 24"
            time: { type: string }   # e.g. 09:15
          required: [date, time]
      booking_url: { type: string }
    required: [slots, booking_url]
