# A whole agent in one file, demonstrating the tier-1 → tier-2 escalation arc:
# http_fetch returns a JS shell, the js-shell detector escalates, and render_dom
# (a real browser) renders the post-JS DOM to extract the product.
#
# Run it live:     zu run agent.yaml            (needs ANTHROPIC_API_KEY + Docker)
# Run it offline:  zu run --offline             (replays fixtures/, no key/net/Docker)
provider:
  name: anthropic
  model: claude-sonnet-4-6
  api_key_env: ANTHROPIC_API_KEY      # the env var NAME — never the key itself

tiers:                                # the escalation ladder — tools at each tier
  1: [http_fetch, html_parse]         # cheap: try a plain fetch first
  2: [render_dom]                     # expensive: a real browser, unlocked on escalation

plugins:
  detectors: [js-shell]               # an empty JS shell at tier 1 escalates to tier 2
  validators: [schema, grounding]     # shape it, then prove every value is on the page

budget: { max_steps: 12, max_tokens: 100000, wall_time_s: 60 }

task:
  query: "Extract the product name and price from the page."
  target: "https://shop.example/p/acme-widget"
  max_tier: 2
  output_schema:
    type: object
    properties:
      name:  { type: string }
      price: { type: string }
    required: [name, price]
