# A sample task spec. The output_schema is the shape the result must satisfy;
# the `schema` validator enforces it and `grounding` confirms each value is
# actually present in the content the run fetched.

query: "Extract the product name and price."
target: "https://example.com/product/123"
max_tier: 2
output_schema:
  type: object
  properties:
    name: { type: string }
    price: { type: string }
  required: [name, price]
budget: { max_steps: 20, max_tokens: 200000, wall_time_s: 120 }
