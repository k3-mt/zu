name: render-image

# Build and publish the tier-2 render image (the headless-Chromium sandbox the
# `render_dom`/`browser` tools launch). This is the default image hardcoded in
# zu-tools (`ghcr.io/<owner>/zu-render-chromium:latest`), so it must be published
# and PUBLIC for the browser tools to work out of the box.
#
# Publishes to ghcr.io/<owner>/zu-render-chromium on a version tag (v*) or manual run.
# NOTE: GHCR packages are private on first push — set this package's visibility to
# Public once (Packages → zu-render-chromium → Package settings → Change visibility).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zu-render-chromium
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/render-chromium
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
