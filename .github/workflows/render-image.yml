name: render-image

# Build and publish the tier-2 render image (the headless-Chromium sandbox the
# `render_dom`/`browser` tools launch). zu-tools resolves its default image
# generically (zu_tools.render_image.default_render_image): a PINNED tag
# (ZU_RENDER_IMAGE_TAG, default a release tag — not floating `:latest`) under an
# env-overridable namespace. So this workflow must publish that pinned tag (the
# `v*` ref below) PUBLIC for the browser tools to work out of the box; `:latest`
# is only a convenience alias, never what an install pins to.
#
# The image namespace is derived from ${{ github.repository_owner }} (no owner
# literal), and each build is also tagged immutably by commit sha (type=sha).
#
# Publishes to ghcr.io/<owner>/zu-render-chromium on a version tag (v*) or manual run.
# NOTE: GHCR packages are private on first push — set this package's visibility to
# Public once (Packages → zu-render-chromium → Package settings → Change visibility).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Log in to ghcr
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/zu-render-chromium
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: images/render-chromium
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
