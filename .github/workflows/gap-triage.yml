name: gap-triage

# Runs the `automation/gap-triage` zu agent over a capability-gap issue and posts a
# structured triage back as a comment — zu maintaining zu.
#
# SECURITY: the issue body is attacker-controllable (anyone can open an issue), so this
# workflow is hardened (see automation/gap-triage/README.md):
#   * Trigger is the `capability-gap` LABEL (applying it needs triage/write perms) — an
#     untrusted user opening an issue cannot self-trigger the agent.
#   * Least-privilege token: contents:read + issues:write only.
#   * The issue is injected STRUCTURALLY (automation/gap-triage/triage.py render, via env —
#     never spliced into a run: script), and the agent has no egress tools + containment:
#     required, so there is no channel to exfiltrate the model key / the token.
#   * ONLY the schema-validated structured result is posted — never the raw `zu run`
#     transcript — and its bounded fields are sanitised (mentions/#refs/HTML/links
#     neutralised, length capped) before posting. Arbitrary model prose never reaches the
#     public issue.
#   * A failed / over-budget / schema-invalid run does NOT post a success comment or label
#     the issue `triaged` — the run's exit status is honoured, never force-succeeded.
#   * Third-party actions are pinned to commit SHA.
#
# CONFIG is vendor-NEUTRAL and fully OPTIONAL. The model is reached through one generic
# key plus an optional endpoint/model — no vendor is named. If the key is unset the whole
# workflow is a clean no-op. Configure (any OpenAI-compatible provider):
#   * secret  ZU_MODEL_API_KEY   — the API key (required to enable; absent ⇒ skip)
#   * var     ZU_MODEL_BASE_URL  — the endpoint (optional; adapter default if unset)
#   * var     ZU_MODEL           — the model id (optional)

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

concurrency:
  group: gap-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    # Only the capability-gap label, and not bot-driven, fires the agent.
    if: github.event.label.name == 'capability-gap' && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    env:
      NUMBER: ${{ github.event.issue.number }}
    steps:
      - name: Check for a model key
        id: precheck
        env:
          KEY: ${{ secrets.ZU_MODEL_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "ZU_MODEL_API_KEY not set — skipping (no-op)."; echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.precheck.outputs.ok == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up uv
        if: steps.precheck.outputs.ok == 'true'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Install
        if: steps.precheck.outputs.ok == 'true'
        run: uv sync

      - name: Render triage agent from the issue (structural, injection-safe)
        if: steps.precheck.outputs.ok == 'true'
        env:
          # Passed as env (NOT interpolated into the script) — the safe way to hand
          # untrusted GitHub context to a step.
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ZU_MODEL: ${{ vars.ZU_MODEL }}            # optional model id, injected into the agent
        run: uv run python automation/gap-triage/triage.py render automation/gap-triage/agent.yaml /tmp/triage

      - name: Run the triage agent (one live model call, no egress tools)
        if: steps.precheck.outputs.ok == 'true'
        env:
          ZU_MODEL_API_KEY: ${{ secrets.ZU_MODEL_API_KEY }}    # generic key — any provider
          ZU_MODEL_BASE_URL: ${{ vars.ZU_MODEL_BASE_URL }}     # optional endpoint
        # Capture the transcript for parsing. The run's failure must NOT be masked as
        # success (F59). We still want the transcript on failure, so tee it and preserve the
        # run's exit status via pipefail rather than force-succeeding the step.
        run: |
          set -o pipefail
          uv run zu run /tmp/triage --no-stream --no-track 2>&1 | tee /tmp/triage.out

      - name: Compose the triage comment (schema-validated result ONLY, sanitised)
        if: steps.precheck.outputs.ok == 'true'
        # Extracts the bounded, schema-validated result from the transcript and renders it —
        # the raw transcript is never posted. Exits non-zero (no comment) if the run had no
        # schema-valid result, so this step (and the job) fails visibly instead of pretending
        # success (F54/F55/F59).
        run: uv run python automation/gap-triage/triage.py comment /tmp/triage.out > /tmp/comment.md

      - name: Post triage comment + label
        if: steps.precheck.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "$NUMBER" --body-file /tmp/comment.md
          gh issue edit "$NUMBER" --add-label triaged
