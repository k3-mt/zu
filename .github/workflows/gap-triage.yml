name: gap-triage

# Runs the `automation/gap-triage` zu agent over a capability-gap issue and posts a
# structured triage back as a comment — zu maintaining zu.
#
# SECURITY: the issue body is attacker-controllable (anyone can open an issue), so this
# workflow is hardened (see automation/gap-triage/README.md):
#   * Trigger is the `capability-gap` LABEL (applying it needs triage/write perms) — an
#     untrusted user opening an issue cannot self-trigger the agent.
#   * Least-privilege token: contents:read + issues:write only.
#   * The issue is injected STRUCTURALLY (python -m zu_cli.gap_triage render, via env —
#     never spliced into a run: script), and the agent has no egress tools + containment:
#     required, so there is no channel to exfiltrate ANTHROPIC_API_KEY / the token.
#   * Model output is sanitised (mentions neutralised, length capped) before posting.
#   * Third-party actions are pinned to commit SHA.

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

concurrency:
  group: gap-triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    # Only the capability-gap label, and not bot-driven, fires the agent.
    if: github.event.label.name == 'capability-gap' && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    env:
      NUMBER: ${{ github.event.issue.number }}
    steps:
      - name: Check for model key
        id: precheck
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "ANTHROPIC_API_KEY not set — skipping (no-op)."; echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.precheck.outputs.ok == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up uv
        if: steps.precheck.outputs.ok == 'true'
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          enable-cache: true

      - name: Install
        if: steps.precheck.outputs.ok == 'true'
        run: uv sync

      - name: Render triage agent from the issue (structural, injection-safe)
        if: steps.precheck.outputs.ok == 'true'
        env:
          # Passed as env (NOT interpolated into the script) — the safe way to hand
          # untrusted GitHub context to a step.
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: uv run python -m zu_cli.gap_triage render automation/gap-triage/agent.yaml /tmp/triage

      - name: Run the triage agent (one live model call, no egress tools)
        if: steps.precheck.outputs.ok == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # Best-effort: capture the result block whatever the outcome, then post it.
        run: uv run zu run /tmp/triage --no-stream --no-track > /tmp/triage.out 2>&1 || true

      - name: Sanitise the agent output
        if: steps.precheck.outputs.ok == 'true'
        run: uv run python -m zu_cli.gap_triage sanitize /tmp/triage.out > /tmp/triage.clean

      - name: Post triage comment + label
        if: steps.precheck.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "> 🤖 **Automated triage** — generated by the \`gap-triage\` zu agent."
            echo "> Model output: treat as untrusted, a maintainer should verify before acting."
            echo
            cat /tmp/triage.clean
          } > /tmp/comment.md
          gh issue comment "$NUMBER" --body-file /tmp/comment.md
          gh issue edit "$NUMBER" --add-label triaged
