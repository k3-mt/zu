name: live

# Tier 4: the @live lane — real models over the network. Costs money and needs
# secrets, so it does NOT run per-PR: nightly + on demand only. Tests that need a
# key self-skip when it's absent (so a no-secret run is green, not red).
on:
  schedule:
    - cron: "0 6 * * *"   # daily ~06:00 UTC
  workflow_dispatch:

# Least-privilege default. This lane only reads the repo and runs tests; it never
# writes back. (Secrets are still available via `secrets.*`; `permissions` governs
# the GITHUB_TOKEN scope, not env secrets.)
permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    env:
      # Vendor API keys are genuine secrets → secrets.*. The tests self-skip when a
      # key is absent, so a no-secret run is green; no vendor is *required* here.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # A base URL is configuration, not a secret — carry it as a plain repo
      # variable (optional; empty when unset) instead of secrets.*. Sourcing an
      # endpoint from secrets is the coupling F77 flags.
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
      - run: uv sync
      - name: Tier 4 — live model tests (skip cleanly without keys)
        run: uv run pytest --run-live -m live
