name: live

# Tier 4: the @live lane — real models over the network. Costs money and needs
# secrets, so it does NOT run per-PR: nightly + on demand only. Tests that need a
# key self-skip when it's absent (so a no-secret run is green, not red).
on:
  schedule:
    - cron: "0 6 * * *"   # daily ~06:00 UTC
  workflow_dispatch:

# Least-privilege default. This lane only reads the repo and runs tests; it never
# writes back. (Secrets are still available via `secrets.*`; `permissions` governs
# the GITHUB_TOKEN scope, not env secrets.)
permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          enable-cache: true
      - run: uv sync
      - name: Tier 4 — live model tests (skip cleanly without keys)
        run: uv run pytest --run-live -m live
