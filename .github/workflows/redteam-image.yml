name: redteam-image

# Build and publish the red-team container image (RED_TEAM_CONTAINER.md). The
# image carries the workspace + the `zu-redteam-run` and `zu-egress-proxy`
# entrypoints, so the live container form (sidecar topology) can pull a
# known-good image instead of building per run.
#
# Publishes to ghcr.io/<owner>/zu-redteam on a version tag (v*) or manual run.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Log in to ghcr
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/zu-redteam
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Optional: on a self-hosted runner with Docker, run the live enforcement
  # proofs against the freshly built image. Disabled by default (the GitHub-hosted
  # ubuntu runner cannot create --internal networks with external bridging the way
  # the proofs need); enable by setting repo variable REDTEAM_LIVE_GATE=true and
  # registering a runner labelled `docker-live`.
  live-gate:
    if: ${{ vars.REDTEAM_LIVE_GATE == 'true' }}
    runs-on: [self-hosted, docker-live]
    needs: build-and-push
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - run: docker build -t zu-redteam:live .
      - run: validation/redteam/live_gate.sh zu-redteam:live
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - run: ZU_REDTEAM_LIVE_DOCKER=1 uv run pytest packages/zu-redteam/tests/test_live_docker.py
