# Publish the Zu distributions to PyPI on a version tag — token-free via PyPI
# Trusted Publishing (GitHub OIDC). Building blocks:
#
#   uv build --all-packages   → sdist + wheel for every workspace member into dist/
#   pypa/gh-action-pypi-publish → uploads dist/ using a short-lived OIDC token
#
# ONE-TIME SETUP (on PyPI, per distribution — these are all available as of setup):
#   For each of: zu-core, zu-providers, zu-tools, zu-checks, zu-backends,
#   zu-redteam, zu-cli, zu-huggingface, zu-runtime — add a "pending" Trusted
#   Publisher at https://pypi.org/manage/account/publishing/ with:
#     Owner: k3-mt   Repo: zu   Workflow: publish.yml   Environment: pypi
#   (Pending publishers create the project on first publish — no token needed.)
#   zu-testing is dev-only: it is removed from dist/ before upload, never published.
# Then create the `pypi` environment in the repo settings, and:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Tip: validate end-to-end against TestPyPI first by temporarily pointing the
# publish step at https://test.pypi.org/legacy/ (repository-url) with a pending
# publisher there.
name: publish

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # Build every workspace member (zu-core … zu-huggingface, zu-runtime) into
      # ./dist, then drop the dev-only zu-testing so it is never uploaded.
      - run: uv build --all-packages
      - run: rm -f dist/zu_testing-*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # gate the release behind the `pypi` environment
    permissions:
      id-token: write          # OIDC for Trusted Publishing — NO token stored in the repo
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        # All 9 published projects trust this same workflow, so one upload
        # publishes the set. ``skip-existing`` makes a re-tag idempotent: a
        # version already on PyPI is skipped (not an error), so adding a new
        # distribution — e.g. zu-huggingface — to an existing version line
        # uploads only the new one.
        with:
          skip-existing: true
