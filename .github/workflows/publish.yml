# Publish the Zu distributions to PyPI on a version tag — token-free via PyPI
# Trusted Publishing (GitHub OIDC). Building blocks:
#
#   uv build --all-packages   → sdist + wheel for every workspace member into dist/
#   pypa/gh-action-pypi-publish → uploads dist/ using a short-lived OIDC token
#
# ONE-TIME SETUP (on PyPI, per distribution — these are all available as of setup):
#   For each of: zu-core, zu-providers, zu-tools, zu-checks, zu-backends,
#   zu-redteam, zu-cli, zu-huggingface, zu-runtime, zu-patterns, zu-shadow — add
#   a "pending" Trusted Publisher at https://pypi.org/manage/account/publishing/ with:
#     Owner: k3-mt   Repo: zu   Workflow: publish.yml   Environment: pypi
#   (Pending publishers create the project on first publish — no token needed.)
#   zu-testing is dev-only: it is removed from dist/ before upload, never published.
# Then create the `pypi` environment in the repo settings, and:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Tip: validate end-to-end against TestPyPI first by temporarily pointing the
# publish step at https://test.pypi.org/legacy/ (repository-url) with a pending
# publisher there.
name: publish

on:
  push:
    tags: ["v*"]

# Least-privilege default; the publish job below elevates id-token: write at job
# level for OIDC Trusted Publishing.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      # Build every workspace member (zu-core … zu-huggingface, zu-runtime) into
      # ./dist, then drop the dev-only zu-testing so it is never uploaded.
      - run: uv build --all-packages
      - run: rm -f dist/zu_testing-*
      # Provenance manifest: record a sha256 of every file that will be published.
      # The publish job re-verifies each dist file against this manifest before
      # uploading, so an artifact tampered with between the (unprivileged) build
      # job and the (id-token: write) publish job is caught, not shipped. Generic:
      # hashes every file in dist/, no per-file hardcoding.
      - name: Record provenance manifest (sha256 of every dist file)
        working-directory: dist
        run: sha256sum -- * > SHA256SUMS   # -- so a dist name with a leading dash isn't read as an option (SC2035)
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # gate the release behind the `pypi` environment
    permissions:
      id-token: write          # OIDC for Trusted Publishing — NO token stored in the repo
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/
      # Provenance gate: re-verify every dist file against the sha256 manifest the
      # build job recorded, THEN drop the manifest so only real distributions are
      # uploaded. A file altered between jobs fails sha256sum -c and stops the run
      # before the privileged (OIDC Trusted Publishing) upload.
      - name: Verify artifact provenance (sha256 re-check)
        working-directory: dist
        run: |
          set -euo pipefail
          test -f SHA256SUMS || { echo "provenance manifest missing"; exit 1; }
          sha256sum -c SHA256SUMS
          rm -f SHA256SUMS
      - uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc  # v1.12.4
        # All 9 published projects trust this same workflow, so one upload
        # publishes the set. ``skip-existing`` makes a re-tag idempotent: a
        # version already on PyPI is skipped (not an error), so adding a new
        # distribution — e.g. zu-huggingface — to an existing version line
        # uploads only the new one.
        with:
          skip-existing: true
