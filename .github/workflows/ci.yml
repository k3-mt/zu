name: ci

on: [push, pull_request]

# Least-privilege default: every job runs read-only. No job here writes to the
# repo; grant any elevated scope per-job (with a comment naming the step) if that
# ever changes.
permissions:
  contents: read

jobs:
  # Tier 0–1: unit + integration, fully hermetic (no network, no Docker). This is
  # the gate every PR must pass. Includes the example agents (run offline against
  # their fixtures) via the normal pytest run.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check packages community automation  # also lint the bot + CI agent
      - run: uv run pytest --cov   # enforces the coverage floor in [tool.coverage]
      - run: uv run mypy packages

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
      - run: uv sync
      # Supply-chain visibility: fail on a known-vulnerable dependency.
      - run: uvx pip-audit

  # Static-lint the GitHub Actions workflows themselves — catches bad `if:`
  # expressions, unknown contexts, shell quoting bugs, and typos before they ship.
  workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # Pinned release tag + checksum-verified binary — no remote script piped
      # into a shell, no floating upstream ref. Bump VERSION+SHA256 together
      # (the published checksum is in actionlint_<ver>_checksums.txt).
      - name: actionlint (pinned, checksum-verified)
        env:
          ACTIONLINT_VERSION: "1.7.7"
          ACTIONLINT_SHA256: "023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757"
        run: |
          set -euo pipefail
          tarball="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -sSfL -o "$tarball" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${tarball}"
          echo "${ACTIONLINT_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" actionlint
          ./actionlint -color

  # Tier 2–3: build the image, then run everything marked @docker — the whole
  # agent inside the hardened container + the red-team egress enforcement proofs +
  # the containment shell suite. Skipped on PRs to keep them fast; runs on pushes
  # and on demand.
  docker:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
      - run: uv sync
      - name: Build the image under test
        run: docker build -t zu:ci .
      - name: Tier 2–3 — docker-marked tests (launcher + redteam enforcement)
        env:
          ZU_SANDBOX_IMAGE: zu:ci
          ZU_REDTEAM_CONTAINER_IMAGE: zu:ci
        run: uv run pytest --run-docker -m docker
      - name: Tier 3 — containment proof suite
        env:
          ZU_IMAGE: zu:ci
        run: bash validation/containment/run_all.sh --no-build
