name: ci

on: [push, pull_request]

jobs:
  # Tier 0–1: unit + integration, fully hermetic (no network, no Docker). This is
  # the gate every PR must pass. Includes the example agents (run offline against
  # their fixtures) via the normal pytest run.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check packages community automation  # also lint the bot + CI agent
      - run: uv run pytest --cov   # enforces the coverage floor in [tool.coverage]
      - run: uv run mypy packages

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync
      # Supply-chain visibility: fail on a known-vulnerable dependency.
      - run: uvx pip-audit

  # Static-lint the GitHub Actions workflows themselves — catches bad `if:`
  # expressions, unknown contexts, shell quoting bugs, and typos before they ship.
  workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  # Tier 2–3: build the image, then run everything marked @docker — the whole
  # agent inside the hardened container + the red-team egress enforcement proofs +
  # the containment shell suite. Skipped on PRs to keep them fast; runs on pushes
  # and on demand.
  docker:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync
      - name: Build the image under test
        run: docker build -t zu:ci .
      - name: Tier 2–3 — docker-marked tests (launcher + redteam enforcement)
        env:
          ZU_SANDBOX_IMAGE: zu:ci
          ZU_REDTEAM_CONTAINER_IMAGE: zu:ci
        run: uv run pytest --run-docker -m docker
      - name: Tier 3 — containment proof suite
        env:
          ZU_IMAGE: zu:ci
        run: bash validation/containment/run_all.sh --no-build
