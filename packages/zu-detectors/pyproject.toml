[project]
name = "zu-detectors"
version = "0.1.0"
description = "Zu built-in detectors: empty, error, js-shell, bot-wall"
requires-python = ">=3.11"
dependencies = ["zu-core"]

[project.entry-points."zu.detectors"]
empty = "zu_detectors.empty:EmptyDetector"
error = "zu_detectors.error:ErrorDetector"
js-shell = "zu_detectors.js_shell:JsShellDetector"
bot-wall = "zu_detectors.bot_wall:BotWallDetector"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zu_detectors"]
