[project]
name = "zu-runtime"
version = "0.1.0"
description = "An opinionated, backend-agnostic runtime for agents that work in production — deterministic, auditable, injection-resistant. Import as `zu`."
requires-python = ">=3.11"
license = "Apache-2.0"
readme = "README.md"
keywords = ["agents", "llm", "ai-agents", "runtime", "web-scraping", "sandbox", "event-sourcing"]
# The one-line install: this pulls in the CLI and every built-in plugin, so
# `pip install zu-runtime` gives you `import zu`, the `zu` command, and all six
# ports populated out of the box.
dependencies = ["zu-cli==0.1.0"]

[project.optional-dependencies]
# Convenience extras that flow through to the underlying packages.
serve = ["zu-cli[serve]==0.1.0"]
anthropic = ["zu-providers[anthropic]==0.1.0"]
openai = ["zu-providers[openai]==0.1.0"]
docker = ["zu-backends[docker]==0.1.0"]
# Everything: the server, both real model SDKs, and the Docker sandbox client.
all = [
    "zu-cli[serve]==0.1.0",
    "zu-providers[anthropic]==0.1.0",
    "zu-providers[openai]==0.1.0",
    "zu-backends[docker]==0.1.0",
]

[project.urls]
Homepage = "https://github.com/k3-mt/zu"
Repository = "https://github.com/k3-mt/zu"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zu"]
