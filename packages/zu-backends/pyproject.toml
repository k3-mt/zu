[project]
name = "zu-backends"
version = "0.6.0"
description = "Zu sandbox backends and event sinks: local-docker, sqlite"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Typing :: Typed",
]
dependencies = ["zu-core==0.6.0"]

[project.optional-dependencies]
docker = ["docker>=7"]
encryption = ["cryptography>=42"]

# The egress proxy as a sidecar container for the red-team container form
# (RED_TEAM_CONTAINER.md §3.1): the target's sole route off-box, streaming its
# connection log as JSONL on stdout.
[project.scripts]
zu-egress-proxy = "zu_backends.egress_proxy:main"

[project.entry-points."zu.backends"]
local-docker = "zu_backends.local_docker:LocalDockerBackend"
oop-launcher = "zu_backends.oop_launcher:OutOfProcessLauncher"

[project.entry-points."zu.sinks"]
sqlite = "zu_backends.sqlite_sink:SqliteSink"
jsonl = "zu_backends.jsonl_sink:JsonlSink"

# A harness-owned channel to an external endpoint (ZU-NET-2): the reference
# credential broker. Run out-of-process via the oop-launcher for a real
# memory boundary (ZU-NET-3).
[project.entry-points."zu.channels"]
credential-broker = "zu_backends.broker:CredentialBroker"

# Attestable workload identity (ZU-NET-4/5): the stdlib-only static reference.
[project.entry-points."zu.workload_identity"]
static = "zu_backends.identity:StaticIdentity"

# Pluggable egress enforcement (ZU-NET-1): default-DROP + DNS gating mechanisms.
[project.entry-points."zu.egress_enforcement"]
docker-internal-net = "zu_backends.egress_enforce:DockerInternalNetEnforcement"
nftables = "zu_backends.egress_enforce:NftablesEnforcement"

[project.entry-points."zu.triggers"]
webhook = "zu_backends.triggers:WebhookTrigger"
queue = "zu_backends.triggers:QueueTrigger"
schedule = "zu_backends.triggers:ScheduleTrigger"
object-store = "zu_backends.triggers:ObjectStoreTrigger"

[project.urls]
Homepage = "https://github.com/k3-mt/zu"
Repository = "https://github.com/k3-mt/zu"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zu_backends"]
