[project]
name = "zu-cli"
version = "0.1.0"
description = "The `zu` command — Agent Production Runtime CLI"
requires-python = ">=3.11"
license = "Apache-2.0"
# The CLI is the batteries-included entry point: it depends on every built-in
# plugin package so `zu run` discovers them out of the box. Config still selects
# which are active per run; a user's own plugins are discovered the same way.
dependencies = [
    "zu-core==0.1.0",
    "zu-providers==0.1.0",
    "zu-tools==0.1.0",
    "zu-detectors==0.1.0",
    "zu-validators==0.1.0",
    "zu-backends==0.1.0",
    "typer",
    "pyyaml",
]

[project.optional-dependencies]
# `zu serve` — the HTTP wrapper. Kept optional so the CLI/library never force a
# web framework on a user who only embeds or runs one-shot tasks.
serve = ["fastapi>=0.110", "uvicorn>=0.27"]

[project.urls]
Homepage = "https://github.com/k3-mt/zu"
Repository = "https://github.com/k3-mt/zu"

[project.scripts]
zu = "zu_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zu_cli"]
