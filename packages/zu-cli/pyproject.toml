[project]
name = "zu-cli"
version = "0.1.0"
description = "The `zu` command — Agent Production Runtime CLI"
requires-python = ">=3.11"
dependencies = ["zu-core", "zu-providers", "typer", "pyyaml"]

[project.scripts]
zu = "zu_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zu_cli"]
