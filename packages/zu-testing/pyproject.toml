[project]
name = "zu-testing"
version = "0.2.1"
description = "Zu test kit: shared fakes, fixtures, and a pytest plugin for testing Zu and its plugins"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Framework :: Pytest",
    "Topic :: Software Development :: Testing",
    "Typing :: Typed",
]
# Hard deps are the floor: zu-core (the contracts the fakes implement), pytest
# (the fixtures/plugin), and httpx (the mock transport). Heavier siblings
# (zu-tools, zu-providers) are LAZY-imported inside the fixtures that need them,
# so the dep graph stays acyclic — every package can depend on zu-testing for
# dev without zu-testing depending back on them.
dependencies = ["zu-core==0.2.1", "pytest>=8", "httpx"]

[project.urls]
Homepage = "https://github.com/k3-mt/zu"
Repository = "https://github.com/k3-mt/zu"

# Auto-loaded by pytest in any environment where zu-testing is installed, so the
# markers/options/fixtures are available everywhere with no per-repo conftest.
[project.entry-points.pytest11]
zu_testing = "zu_testing.plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zu_testing"]
