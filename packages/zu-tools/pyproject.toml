[project]
name = "zu-tools"
version = "0.8.0"
description = "Zu built-in tools: web_search, http_fetch, html_parse, pdf_extract, render_dom, browser"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Typing :: Typed",
]
# zu-backends supplies render_dom's default sandbox (local-docker); it is
# imported lazily, so a tier-1-only run never touches it, but the default
# tier-2 render works out of the box once installed.
dependencies = ["zu-core==0.8.0", "httpx>=0.27", "selectolax", "zu-backends==0.8.0"]

[project.optional-dependencies]
# pdf_extract reads PDF content streams with pypdf — a PURE PARSER with no JS
# engine, so a malicious doc's embedded JavaScript is never run (§9.5: prevention
# above containment). Optional + lazy-imported so a base install still discovers
# the tool; the tool raises a clear install hint if the extra is absent.
pdf = ["pypdf>=6"]

[project.entry-points."zu.tools"]      # <- how a tool is registered
web_search = "zu_tools.search:WebSearch"
http_fetch = "zu_tools.fetch:HttpFetch"
browser = "zu_tools.browser:Browser"
recall = "zu_tools.recall:Recall"
html_parse = "zu_tools.parse:HtmlParse"
render_dom = "zu_tools.render:RenderDom"
action_surface = "zu_tools.action_surface:ActionSurface"
pointer = "zu_tools.pointer:PointerControl"
vision = "zu_tools.vision:VisionCapture"
simulate = "zu_tools.simulate:Simulate"
pdf_extract = "zu_tools.pdf:PdfExtract"

# The connected-surface family (#93/#94/#95): web Action Surfaces over an external
# CDP target a host owns, reusing the action_surface reduction.
[project.entry-points."zu.connected_surfaces"]
cdp = "zu_tools.connected_surface:CdpConnectedSurface"

[project.entry-points."zu.consent_resolvers"]
whole_word = "zu_tools.consent:WholeWordConsentResolver"

[project.entry-points."zu.selection_satisfiers"]
first_option = "zu_tools.selection:FirstOptionSelectionSatisfier"

[project.entry-points."zu.checkout_proceeders"]
whole_word = "zu_tools.checkout:WholeWordCheckoutProceeder"

[project.entry-points."zu.cart_adders"]
whole_word = "zu_tools.cart:WholeWordCartAdder"

[project.entry-points."zu.funnel_phase_classifiers"]
web = "zu_tools.funnel:WebFunnelPhaseClassifier"

# The interaction-primitive family (#125): the closed vocabulary of generic verified
# moves (dismiss/search/choose_one/advance/commit_stop) the vertical resolvers reduce to.
[project.entry-points."zu.interaction_primitives"]
dismiss = "zu_tools.primitives:DismissPrimitive"
search = "zu_tools.primitives:SearchPrimitive"
choose_one = "zu_tools.choose:ChooseOne"
advance = "zu_tools.primitives:AdvancePrimitive"
commit_stop = "zu_tools.primitives:CommitStopPrimitive"

# The composition layer that dispatches {kind, hint} over the family (#125).
[project.entry-points."zu.primitive_runtimes"]
standard = "zu_tools.primitives:StandardPrimitiveRuntime"

[project.urls]
Homepage = "https://github.com/k3-mt/zu"
Repository = "https://github.com/k3-mt/zu"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zu_tools"]
