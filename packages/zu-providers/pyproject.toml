[project]
name = "zu-providers"
version = "0.8.0"
description = "Zu model-provider adapters: scripted, anthropic, openai-compatible"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Typing :: Typed",
]
dependencies = ["zu-core==0.8.0"]

[project.optional-dependencies]
anthropic = ["anthropic>=0.40"]
openai = ["openai>=1.40"]

[project.entry-points."zu.providers"]
scripted = "zu_providers.scripted:ScriptedProvider"
anthropic = "zu_providers.anthropic:AnthropicProvider"
openai-compatible = "zu_providers.openai_compatible:OpenAICompatibleProvider"

# RetrievalProvider — typed vendor/product discovery (#81). The scripted fake is
# the offline default; the web_search reducer is the open-web fallback.
[project.entry-points."zu.retrieval_providers"]
scripted = "zu_providers.retrieval:ScriptedRetrievalProvider"
web_search = "zu_providers.retrieval:WebSearchRetrievalProvider"

# ReputationProvider — the deterministic merchant-trust scorer (#84).
[project.entry-points."zu.reputation_providers"]
deterministic = "zu_providers.reputation:DeterministicReputationScorer"

[project.urls]
Homepage = "https://github.com/k3-mt/zu"
Repository = "https://github.com/k3-mt/zu"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zu_providers"]
