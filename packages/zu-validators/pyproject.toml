[project]
name = "zu-validators"
version = "0.1.0"
description = "Zu built-in validators: schema, grounding"
requires-python = ">=3.11"
dependencies = ["zu-core", "jsonschema>=4"]

[project.entry-points."zu.validators"]
schema = "zu_validators.schema:SchemaValidator"
grounding = "zu_validators.grounding:GroundingValidator"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zu_validators"]
